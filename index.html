<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Choice Market</title>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <!-- External CSS -->
  <link rel="stylesheet" href="./assets/style.css" />
</head>
<body>

  <!-- ========== HEADER ========== -->
  <header>
    <div class="container">
      <a href="#" class="logo">
        <i class="fas fa-store-alt"></i> Choice Market
      </a>

      <div class="search-wrapper">
        <input type="text" id="searchInput" placeholder="Mahsulot izlash..." />
        <i class="fas fa-search search-icon"></i>
      </div>

      <div class="header-actions">
        <button id="darkModeToggle" class="dark-mode-btn">
          <i class="fas fa-moon"></i>
        </button>
        <button id="cartToggle" class="cart-btn">
          <i class="fas fa-shopping-cart"></i>
          <span class="hidden-sm">Savat</span>
          <span id="cartCount" class="cart-badge">0</span>
        </button>
        <button class="login-btn">
          <i class="fas fa-user"></i> Kirish
        </button>
      </div>
    </div>
  </header>

  <!-- ========== MAIN ========== -->
  <main>
    <div class="container">

      <!-- Filters -->
      <div class="filters-wrapper">
        <span class="filter-label"><i class="fas fa-sliders-h"></i> Filter:</span>
        <button class="filter-btn active" data-filter="all">Hammasi</button>
        <button class="filter-btn" data-filter="electronics">Elektronika</button>
        <button class="filter-btn" data-filter="clothing">Kiyim</button>
        <button class="filter-btn" data-filter="home">Uy-joy</button>
        <button class="filter-btn" data-filter="books">Kitoblar</button>
        <span class="result-count" id="resultCount">12 ta mahsulot</span>
      </div>

      <!-- Products grid -->
      <div id="productsGrid" class="products-grid">
        <!-- Mahsulotlar JavaScript orqali yuklanadi -->
      </div>

    </div>
  </main>

  <!-- ========== SHOPPING CART SIDEBAR ========== -->
  <div id="cartSidebar" class="cart-sidebar">
    <div class="cart-header">
      <h2><i class="fas fa-shopping-cart"></i> Savat</h2>
      <button id="closeCart" class="close-cart">&times;</button>
    </div>
    <div id="cartItems" class="cart-items">
      <p class="empty-cart">Savat bo'sh</p>
    </div>
    <div class="cart-footer">
      <div class="cart-total">
        <span>Jami:</span>
        <span id="cartTotal">0 so'm</span>
      </div>
      <button class="checkout-btn">
        <i class="fas fa-credit-card"></i> Buyurtma berish
      </button>
    </div>
  </div>

  <!-- Overlay -->
  <div id="cartOverlay" class="cart-overlay hidden"></div>

  <!-- External JavaScript -->
  <script src="./assets/script.js"></script>
</body>
</html>
